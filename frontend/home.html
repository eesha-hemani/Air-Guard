<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <title>Air Guard - Home</title>
    <style>
        :root {
            --glass-bg: rgba(0, 0, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-green: #6BBF8A;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('background.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .glass-container {
            width: 90%;
            max-width: 1100px;
            height: 600px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .glass-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(100px) brightness(0.8); 
            transform: scale(1.2);
            z-index: -1;
        }

        .nav-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
            gap: 45px;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2;
        }

        .nav-item {
            text-decoration: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            width: fit-content;
            opacity: 0.6;
            padding-left: 15px;
            border-left: 4px solid transparent;
        }

        .nav-item:hover {
            opacity: 1;
            transform: translateX(15px);
            color: var(--accent-green);
            border-left: 4px solid var(--accent-green);
            text-shadow: 0 0 20px rgba(107, 191, 138, 0.6);
        }

        /* UPDATED SECTION: Column layout to put text below */
        .logo-section {
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            z-index: 2;
            gap: 25px; /* Adjusts space between logo and text */
        }

        .main-logo {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--accent-green);
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(107, 191, 138, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.05);
            animation: breathe 6s infinite ease-in-out;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: white;
            margin-right: -12px; /* For perfect centering */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
        }

        .brand-header {
            position: absolute;
            top: 45px;
            left: 80px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 6px;
            opacity: 0.8;
        }

        .status-footer {
            position: absolute;
            bottom: 45px;
            left: 80px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            opacity: 0.6;
            display: flex;
            gap: 40px;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }

        @media (max-width: 800px) {
            .glass-container { grid-template-columns: 1fr; height: auto; padding: 60px 0; }
            .nav-section { padding: 50px; align-items: center; order: 2; padding-left: 0; }
            .logo-section { order: 1; }
            .main-logo { width: 220px; height: 220px; }
            .logo-text { font-size: 2.5rem; letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <div class="brand-header">BY TEAM CODE BLUE</div>

        <nav class="nav-section">
            <a href="signup.html" class="nav-item">Signup</a>
            <a href="login.html" class="nav-item">Login</a>
            <a href="about.html" class="nav-item">About</a>
        </nav>

        <div class="logo-section">
            <img src="logo.png" class="main-logo" alt="Air Guard Logo">
            <div class="logo-text">AIR GUARD</div>
        </div>

        <div class="status-footer">
            <span>EST. 2026</span>
            <span>INTELLIGENT AIR ANALYSIS</span>
        </div>
    </div>

</body>
</html>
